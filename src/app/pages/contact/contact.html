<div class="page container">
  <h1 class="page-title">{{ i18n.t('contact.title') }}</h1>
  <p class="page-lead">{{ i18n.t('contact.lead') }}</p>

  <div class="contact-grid">
    <form class="card" [formGroup]="form" (ngSubmit)="submit()">
      <!-- Honeypot: invisible to humans, irresistible to bots -->
      <input type="checkbox" formControlName="botcheck" class="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" />

      <label>
        {{ i18n.t('contact.name') }} *
        <input type="text" formControlName="name" autocomplete="name" [class.invalid]="invalid('name')" />
        @if (invalid('name')) {
          <span class="err">{{ i18n.t('contact.required') }}</span>
        }
      </label>

      <label>
        {{ i18n.t('contact.email') }} *
        <input type="email" formControlName="email" autocomplete="email" [class.invalid]="invalid('email')" />
        @if (invalid('email')) {
          <span class="err">{{ i18n.t('contact.invalidEmail') }}</span>
        }
      </label>

      <label>
        {{ i18n.t('contact.subject') }}
        <input type="text" formControlName="subject" [placeholder]="i18n.t('contact.subject.placeholder')" />
      </label>

      <label>
        {{ i18n.t('contact.message') }} *
        <textarea rows="7" formControlName="message" [class.invalid]="invalid('message')"></textarea>
        @if (invalid('message')) {
          <span class="err">{{ i18n.t('contact.required') }}</span>
        }
      </label>

      @if (state() === 'success') {
        <p class="banner success">✅ {{ i18n.t('contact.success') }}</p>
      }
      @if (state() === 'error') {
        <p class="banner error">⚠️ {{ i18n.t('contact.error') }}</p>
      }

      <button class="btn primary" type="submit" [disabled]="state() === 'sending'">
        {{ state() === 'sending' ? i18n.t('contact.sending') : i18n.t('contact.send') }}
      </button>
    </form>

    <aside class="card linkedin-box">
      <h2>{{ i18n.t('contact.linkedin.title') }}</h2>
      <p class="muted">{{ i18n.t('contact.linkedin.text') }}</p>
      <a [href]="linkedin" target="_blank" rel="noopener" class="btn">LinkedIn ↗</a>
    </aside>
  </div>
</div>
