<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="str-color">
  <div class="all-container">
    <div class="central-part flex-x-y">
      <div class="center-left flex-x-y">
        nav
      </div>
      <div class="center-mid flex-x-y">
        <div class="score-container flex-x-y flex-col">
          <div id="str-score" class="flex-x-y" ui-str-score>0</div>
          <div id="prestige" class="flex-x-y btn denied_btn">
            <div class="goal flex-x-y">
              <div class="icon_pp flex-x-y">
                <div class="pp">+1</div>
                <div class="icon">☘️</div>
              </div>
              <div class="next_pp_at">5M</div>
            </div>
          </div>
        </div>
      </div>
      <div class="center-right flex-x-y">
        <div id="upgrades"></div>
        <div id="milestones"></div>
      </div>
    </div>
    <div class="bottom-part actions flex-x-y">
      <div class="btns">
        <button str-incBtn class="btn str str-color">+<span str-incBy>1</span></button>
      </div>
    </div>
  </div>


  <!-- cloneable elements -->
   <div id="clones" class="d-none">
    <div id="_milestone" class="milestone unbtn flex-x-y clone">
      <div class="goal">1</div>
      <div class="effect">🗡️</div>
    </div>
    <div id="_upgrade" class="upgrade space-between clone flex-x-y">
      <div class="auto"><input type="checkbox"></div>
      <div class="btn flex-x-y flex-col">
        <div class="cost">1</div>
        <div class="effect">+🗡️</div>
        <div class="total"><span class="totalEff">0</span> -> <span class="EffAfter">1</span></div>
      </div>
    </div>
   </div>
</body>
</html>
