  <title>Uhr</title>
  <style>
    * { margin: 0 }
    button.settings { fill: rgb(80 93 197); }
    button.settings:active { fill: white }
    body, html { min-height: 100vh; min-width: 100vw; }
    body { display: flex; justify-content: space-around; align-items: center; background-color: rgba(161, 171, 255, 0.884); flex-direction: column; text-align: center; overflow: hidden; }
    #clock { position: relative; width: 280px; height: 280px; border: 2px solid black; }
    .round { border-radius: 50%; }
    #clock .face { width: 100%; height: 100%; position: absolute; left: 0; top: 0; }
    #clock .face > div { position: absolute; }
    #clock .face :nth-child(1) { top: 3%; left: 47.5%; }#clock .face :nth-child(2) { top: 9.3%; left: 70.7%; }#clock .face :nth-child(3) { top: 25%; left: 87%; }#clock .face :nth-child(4) { top: 47%; left: 93%; }#clock .face :nth-child(5) { top: 69%; left: 86%; }#clock .face :nth-child(6) { top: 84.5%; left: 70.2%; }#clock .face :nth-child(7) { top: 91%; left: 48.8%; }#clock .face :nth-child(8) { top: 85%; left: 27.4%; }#clock .face :nth-child(9) { top: 69%; left: 11%; }#clock .face :nth-child(10) { top: 47%; left: 4%; }#clock .face :nth-child(11) { top: 25%; left: 10%; }#clock .face :nth-child(12) { top: 9.6%; left: 26.5%; }
    #clock > .hand { height: 100px; width: 2px; background-color: black; position: absolute; left: 50%; bottom: 50%; transform-origin: bottom; will-change: transform; }
    #clock > #hour { height: 50px; width: 6px; }
    #clock > #minute { height: 80px; width: 4px; transition: 1s all; }
    #digital-clock { display: flex; justify-content: center; align-items: center; gap: 1em; font-size: 2.5em; }
    .hide { opacity: 0 }
    #digital-clock #dMinute::before { content: ':'; padding-right: 1em; }
    #digital-clock #dMinute::after { content: ':'; padding-left: 1em; }
    .corner-bottom { position: absolute; bottom: 0; right: 0; width: 5em; height: 5em; z-index: -1; }
    .corner-bottom > div { position: relative; bottom: 0; right: 0; width: 10em; height: 10em; background-color: rgb(11 22 115); border-radius: 50%; z-index: -1; }

    .shadowPulse::before { content: ''; width: inherit; height: inherit; background-color: #ffffff1c; position: absolute; border-radius: 50%; z-index: -1; top: 0; left: 0; animation: 3s shadowPulse alternate infinite; box-shadow: -1em -1em 2em white; }
    @keyframes shadowPulse {
      from { box-shadow: none }
    }
  </style>

<body>
  <h1 style="font-size: 4em;" class="heading hide">Uhr</h1>
  <div id="clock" class="round">
    <div class="face hide"><div>12</div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div></div>
    <div id="hour" class="hand"></div>
    <div id="minute" class="hand"></div>
    <div id="second" class="hand"></div>
  </div>
  <div id="digital-clock" class="hide">
    <div id="dHour"></div>
    <div id="dMinute"></div>
    <div id="dSecond"></div>
  </div>
  <h2 style="font-size: 2em;" id="text" class="hide">einfach nur ne Uhr? 🤔<span id="clock-emoji"></span></h2>
  <button class="settings" style="border: none; padding: 0; cursor: pointer; position: absolute; bottom: .5em; right: .5em; outline: none; background-color: transparent;"
          onclick="settingsEl.classList.toggle('hide')"><svg enable-background="new 0 0 512 512" height="42" width="42" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="m272.066 512h-32.133c-25.989 0-47.134-21.144-47.134-47.133v-10.871c-11.049-3.53-21.784-7.986-32.097-13.323l-7.704 7.704c-18.659 18.682-48.548 18.134-66.665-.007l-22.711-22.71c-18.149-18.129-18.671-48.008.006-66.665l7.698-7.698c-5.337-10.313-9.792-21.046-13.323-32.097h-10.87c-25.988 0-47.133-21.144-47.133-47.133v-32.134c0-25.989 21.145-47.133 47.134-47.133h10.87c3.531-11.05 7.986-21.784 13.323-32.097l-7.704-7.703c-18.666-18.646-18.151-48.528.006-66.665l22.713-22.712c18.159-18.184 48.041-18.638 66.664.006l7.697 7.697c10.313-5.336 21.048-9.792 32.097-13.323v-10.87c0-25.989 21.144-47.133 47.134-47.133h32.133c25.989 0 47.133 21.144 47.133 47.133v10.871c11.049 3.53 21.784 7.986 32.097 13.323l7.704-7.704c18.659-18.682 48.548-18.134 66.665.007l22.711 22.71c18.149 18.129 18.671 48.008-.006 66.665l-7.698 7.698c5.337 10.313 9.792 21.046 13.323 32.097h10.87c25.989 0 47.134 21.144 47.134 47.133v32.134c0 25.989-21.145 47.133-47.134 47.133h-10.87c-3.531 11.05-7.986 21.784-13.323 32.097l7.704 7.704c18.666 18.646 18.151 48.528-.006 66.665l-22.713 22.712c-18.159 18.184-48.041 18.638-66.664-.006l-7.697-7.697c-10.313 5.336-21.048 9.792-32.097 13.323v10.871c0 25.987-21.144 47.131-47.134 47.131zm-106.349-102.83c14.327 8.473 29.747 14.874 45.831 19.025 6.624 1.709 11.252 7.683 11.252 14.524v22.148c0 9.447 7.687 17.133 17.134 17.133h32.133c9.447 0 17.134-7.686 17.134-17.133v-22.148c0-6.841 4.628-12.815 11.252-14.524 16.084-4.151 31.504-10.552 45.831-19.025 5.895-3.486 13.4-2.538 18.243 2.305l15.688 15.689c6.764 6.772 17.626 6.615 24.224.007l22.727-22.726c6.582-6.574 6.802-17.438.006-24.225l-15.695-15.695c-4.842-4.842-5.79-12.348-2.305-18.242 8.473-14.326 14.873-29.746 19.024-45.831 1.71-6.624 7.684-11.251 14.524-11.251h22.147c9.447 0 17.134-7.686 17.134-17.133v-32.134c0-9.447-7.687-17.133-17.134-17.133h-22.   </button>
  <div class="corner-bottom"><div class="shadowPulse"></div></div>
  <div id="settings" class="hide">
    <label for="title">Titel?</label>
    <input type="checkbox" name="title" id="title" onchange="headingEl.classList.toggle('hide')"><br>
    <label for="round">runde Uhr?</label>
    <input type="checkbox" name="round" id="round" onchange="clockEl.classList.toggle('round')" checked><br>
    <label for="digital">Digitale Uhr?</label>
    <input type="checkbox" name="digital" id="digital" onchange="digitalClockEl.classList.toggle('hide')"><br>
    <label for="clock-face">Ziffernblatt?</label>
    <input type="checkbox" name="clock-face" id="clock-face" onchange="clockFaceEl.classList.toggle('hide')"><br>
    <label for="digital">mein Text? 😅</label>
    <input type="checkbox" name="digital" id="digital" onchange="textEl.classList.toggle('hide')">
  </div>
  <script>
    const clockEl = document.getElementById('clock'), clockEmojiEl = document.getElementById('clock-emoji'), digitalClockEl = document.getElementById('digital-clock'), settingsEl = document.getElementById('settings'), today = new Date(),
          to2 = n => ("00"+n).slice(-2), updateClockEmoji = () => clockEmojiEl.textContent = String.fromCodePoint('0x1F55'+(dh%12 ? (dh%12) : 11).toString(16)), textEl = document.getElementById('text'),
          clockFaceEl = document.querySelector('#clock .face'), headingEl = document.querySelector('.heading');
    let running = false, [ds,dm,dh]=[today.getSeconds(), today.getMinutes(), today.getHours()];
    function startClock(interval=17) {
      if(running) return;
      running = true;
      const time = (today - new Date(today.toDateString()));
      let h = time/1000/60/60*30%360, m = time/1000/60*6%360, s = time/1000*6%360;
      setInterval(()=>{
        const shift = 0.006*interval;
        s += shift, m += shift/60, h += shift/60/60;
        clockEl.children.second.style.transform = 'rotate('+ s +'deg)', clockEl.children.minute.style.transform = 'rotate('+ m +'deg)', clockEl.children.hour.style.transform = 'rotate('+ h +'deg)';
      },interval);
      setInterval(() => {
        ds = ds === 59 ? 0 : ds+1;
        if(ds === 0) dm = dm === 59 ? 0 : dm+1;
        if(dm === 0) { dh = dh === 23 ? 0 : dh+1; updateClockEmoji(); }
        digitalClockEl.children.dHour.textContent = to2(dh), digitalClockEl.children.dMinute.textContent = to2(dm), digitalClockEl.children.dSecond.textContent = to2(ds);
      }, 1000);
    }
    updateClockEmoji();
    startClock();
  </script>
